<?xml version="1.0" encoding="UTF-8"?>
<!--
  FundingScout favicon — v2 design.
  Concept: "orbital scout" — a white F at the center of two concentric
  emerald rings, with a small green satellite. Evokes radar / scouting /
  signal detection. Replaces the v1 plain-F design.

  Next.js 16 auto-discovers src/app/icon.svg as the browser favicon.
  Designed for visual integrity at 16x16 (browser tab) — rings stay legible
  because each is a solid stroke ≥ 0.6 viewBox units thick.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Dark backdrop (matches the marketing landing's slate-950). -->
  <rect width="64" height="64" rx="12" fill="#020617"/>

  <!-- Outer ring: bright emerald. -->
  <circle cx="32" cy="32" r="22" stroke="#34d399" stroke-width="2.2" opacity="0.95"/>

  <!-- Inner ring: slightly thinner + offset to evoke orbital motion, with
       a fade gradient so the ring is brighter at the top-left and dims
       toward the bottom-right, matching the source image. -->
  <defs>
    <linearGradient id="innerRingGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#34d399" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0.25"/>
    </linearGradient>
  </defs>
  <circle cx="32" cy="32" r="17" stroke="url(#innerRingGrad)" stroke-width="1.6"/>

  <!-- The orbital sphere at the bottom-right of the inner ring. Positioned
       roughly at the (45°-ish, bottom-right) tangent point. -->
  <circle cx="46" cy="44" r="3.2" fill="#34d399"/>

  <!-- Letter "F" — white, centered, with chunky rounded terminals.
       Built from three rects + corner radius so it stays crisp at 16x16
       without needing a font to load. -->
  <g fill="#ffffff">
    <!-- Stem -->
    <rect x="22"   y="18"  width="5.5" height="28" rx="1.5"/>
    <!-- Top bar -->
    <rect x="22"   y="18"  width="20"  height="5.5" rx="1.5"/>
    <!-- Mid bar (shorter than top) -->
    <rect x="22"   y="29"  width="14"  height="5"   rx="1.4"/>
  </g>
</svg>
